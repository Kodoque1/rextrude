name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  ts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: emu
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: emu/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run fmt:check
      - name: Firmware emulation smoke test
        run: npm run full-test
        timeout-minutes: 10

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check tools/
      - run: ruff format --check tools/

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: emu/package-lock.json
      - run: npm ci --prefix emu
      - uses: jetli/trunk-action@v0.5.1
        with:
          version: 'v0.21.14'
      - name: Build wasm bundle
        working-directory: app
        run: trunk build --release --public-url /rextrude/
      - run: touch app/dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [rust, ts, python, wasm]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

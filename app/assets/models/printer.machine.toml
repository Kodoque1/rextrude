# Machine contract for app/assets/models/printer.glb.
# Generated by tools/gen_printer_assets.py; values transcribed from the
# design-time constants in that script (TRAVEL, SCREW_POSITIONS,
# SYMMETRY_PLANE_X, MAX_TRIANGLES, ...). See crates/rigcheck/README.md for
# the schema reference.

[machine]
name = "i3-bedslinger"
units = "mm"
# machine = (gltf.x, gltf.z, gltf.y): Blender is Z-up; export_yup maps
# Blender (x,y,z) -> glTF (x,z,-y), and machine -> Blender flips Y, so
# machine (x,y,z) -> Blender (x,-y,z) -> glTF (x,z,y).
gltf_to_machine = ["x", "z", "y"]
scene_extent_mm = { min = 50.0, max = 2000.0 }

[envelope]
x = [0.0, 220.0]
y = [0.0, 220.0]
z = [0.0, 60.0]

[budgets]
max_triangles = 5000
max_materials = 1
max_textures = 1

[symmetry]
plane = { axis = "x", at = 110.0 }
labels = ["upright", "z_stepper", "bracket", "nut", "rail", "foot", "knob"]
node_pairs = [["LeadScrew_L", "LeadScrew_R"]]

[tolerances]
contact = 0.01
coplanar = 0.01
mirror = 0.1
weld = 1e-4
degenerate_area = 1e-6

[[node]]
name = "Frame_Static"
role = "static"

[[node]]
name = "Gantry_X"
role = "moving"
motion = { offset = [0.0, 0.0, 0.0], per_gz = [0.0, 0.0, 1.0] }

[[node]]
name = "Carriage_X"
role = "moving"
motion = { offset = [0.0, 110.0, 0.0], per_gx = [1.0, 0.0, 0.0], per_gz = [0.0, 0.0, 1.0] }
contract = { vertex_at_origin = true, min_local = [nan, nan, 0.0] }

[[node]]
name = "Bed_Y"
role = "moving"
motion = { offset = [0.0, 110.0, 0.0], per_gy = [0.0, -1.0, 0.0] }
surface = { plane = "z", at = 0.0, covers_xy = [[0.0, 220.0], [0.0, 220.0]], max_protrusion = 2.01 }

[[node]]
name = "LeadScrew_L"
role = "spinner"
spin = { axis = "z", max_radial_extent = 4.0, translation_required = true }

[[node]]
name = "LeadScrew_R"
role = "spinner"
spin = { axis = "z", max_radial_extent = 4.0, translation_required = true }

[[allow_contact]]
# nozzle tip touching the print surface
a = { node = "Carriage_X", part = "origin_component" }
b = { node = "Bed_Y" }

# The gantry permanently rides on the frame uprights (via its mounting
# brackets) and the lead screws (via its threaded nuts) — by the same
# "attachments overlap in volume instead of sharing render planes"
# convention this file uses everywhere to dodge z-fighting (see build_frame),
# the gantry's authored geometry overlaps these static parts at the joint.
# Whole-node granularity here matches the original Python validator, which
# never checked this pair at all.
[[allow_contact]]
a = { node = "Gantry_X" }
b = { node = "Frame_Static" }

[[allow_contact]]
a = { node = "Gantry_X" }
b = { node = "LeadScrew_L" }

[[allow_contact]]
a = { node = "Gantry_X" }
b = { node = "LeadScrew_R" }
